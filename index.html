<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GitHub Repository Finder</title>

    <link rel="stylesheet" href="css/style.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>

<body>
    <div class="container">
        <header>
            <h1>
                <i class="fa-brands fa-github"></i>
                GitHub Repository Finder
            </h1>

            <p>Discover random repositories by programming language.</p>
        </header>

        <div class="search-card">
            <select id="languageSelect">
                <option value="">Select Language</option>

                <option value="JavaScript">JavaScript</option>
                <option value="TypeScript">TypeScript</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="PHP">PHP</option>
                <option value="Go">Go</option>
                <option value="Rust">Rust</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="Swift">Swift</option>
            </select>

            <button id="searchBtn">Find Repository</button>

            <button id="refreshBtn" class="hidden">Refresh</button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Searching repositories...</p>
        </div>

        <div id="message"></div>

        <div id="repositoryCard" class="repo-card hidden">
            <h2 id="repoName"></h2>

            <p id="repoDescription"></p>

            <div class="stats">
                <div>
                    <i class="fa-solid fa-star"></i>
                    <span id="repoStars"></span>
                </div>

                <div>
                    <i class="fa-solid fa-code-fork"></i>
                    <span id="repoForks"></span>
                </div>

                <div>
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="repoIssues"></span>
                </div>
            </div>

            <a id="repoLink" target="_blank" class="visit-btn">
                Visit Repository
            </a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
